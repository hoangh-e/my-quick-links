<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Links Editor</title>
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────── -->
  <header class="app-header">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         style="color:var(--accent);flex-shrink:0;">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18
               l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75
               21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"/>
    </svg>
    <h1 style="font-size:15px;">Quick Links Editor</h1>

    <div style="flex:1;"></div>

    <div style="display:flex;gap:6px;align-items:center;">
      <!-- shown only when File System Access API available -->
      <button class="btn btn-sm" id="btn-open" onclick="openFile()" style="display:none;">
        Mở File
      </button>
      <button class="btn btn-sm" onclick="importFile()">Import JSON</button>
      <button class="btn btn-sm" id="btn-export" onclick="exportFile()" disabled>Export JSON</button>
      <button class="btn btn-primary btn-sm" id="btn-save" onclick="saveFile()" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057
                   1.907-2.185a48.507 48.507 0 0111.186 0z"/>
        </svg>
        <span id="btn-save-label">Save</span>
      </button>
    </div>
  </header>

  <!-- ── Body: sidebar + panel ─────────────────────────────── -->
  <div class="editor-layout">

    <!-- Sidebar -->
    <div class="editor-sidebar">
      <div class="editor-sidebar-header">
        <h2>Shortcuts</h2>
        <button class="btn btn-primary btn-sm" id="btn-add" onclick="addNew()" disabled>+ Add</button>
      </div>
      <div class="shortcut-list" id="shortcut-list">
        <!-- filled by local-editor.js -->
      </div>
    </div>

    <!-- Edit panel -->
    <div class="editor-panel" id="editor-panel">
      <!-- filled by local-editor.js -->
    </div>
  </div>

  <!-- ── Status bar ─────────────────────────────────────────── -->
  <div class="status-bar" id="status-bar">
    <span>Chưa mở file nào</span>
  </div>

  <div class="toast" id="toast"></div>

  <script src="assets/js/local-editor.js"></script>
</body>
</html>
