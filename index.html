<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal quick links collection">
  <title>My Quick Links</title>
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>

  <header class="app-header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         style="color:var(--accent);flex-shrink:0;">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757
               m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"/>
    </svg>
    <h1>My Quick Links</h1>
  </header>

  <main class="app-main" id="app">
    <div id="loading" class="state-loading">
      <div class="spinner"></div>
      <span>Đang tải shortcuts…</span>
    </div>
    <div id="error" class="state-error" hidden></div>
    <div id="content" hidden></div>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
